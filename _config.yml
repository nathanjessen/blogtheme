title: Blog Theme
description: Theme for Jekyll sites
author: Author Name
logo:
theme: null

# Google Analytics
# ga_tracking_id: G-XXXXXXXXXX

header_pages:
  - index.html
  - _pages/posts.html
  - _pages/tags.html
  - _pages/categories.html
  - _pages/404.html

exclude:
  - node_modules
  - vendor
  - blogtheme.gemspec
  - blogtheme-*.gem
  - Gemfile
  - Gemfile.lock
  - LICENSE.txt
  - package-lock.json
  - package.json
  - README.md
  - tailwind.config.js

# paginate: 5
# paginate_path: /page:num

plugins:
  - jekyll-sitemap
  # - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

collections:
  posts:
    output: true
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"

# Social
# Update with your usernames
# and uncomment to show/enable
# facebook_url: https://facebook.com/
# github_url:  https://github.com/
# twitter_url: https://twitter.com/username
# linkedin_url: https://www.linkedin.com/in/username
# medium_url: https://medium.com/
# instagram_url: https://www.instagram.com/
# dribbble_url: https://dribbble.com/

# TODO: enable once SVGs are updated
# codepen_url: https://codepen.io/
# angellist_url: https://angel.co/

# Customizable Content
recent_posts_title: Recent Posts
recent_posts_content: A collection of articles on web development, design, and the open web.
featured_title: Featured Works
featured_content: A selection of projects I have built or contributed to.
services_title: Services
services_content: Ways I can help — from design and development to speaking engagements.
footer_content: "&copy; 2025 Blog Theme"
attachment_list_title: Attachments
